<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moveit Rádio | Žij hudbou 2026</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; 
            --secondary: #06b6d4; 
            --accent: #f43f5e; 
            --bg-dark: #020617; 
            --text-main: #f8fafc;
            --glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.6);
            --glow-player: rgba(99, 102, 241, 0.2);
        }

        [data-theme="light"] {
            --bg-dark: #f1f5f9;
            --text-main: #0f172a;
            --glass: rgba(255, 255, 255, 0.8);
            --border-glass: rgba(15, 23, 42, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: 0.4s; }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .bg-animate {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at 15% 20%, rgba(99, 102, 241, 0.15), transparent 40%),
                        radial-gradient(circle at 85% 80%, rgba(6, 182, 212, 0.15), transparent 40%);
            animation: pulseBg 15s ease-in-out infinite alternate;
        }
        @keyframes pulseBg { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; width: 100%; z-index: 1; }

        header { text-align: center; margin-bottom: 60px; opacity: 0; animation: fadeIn 1s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }

        h1 {
            font-size: clamp(3.2rem, 12vw, 7.5rem); font-weight: 900; text-transform: uppercase;
            letter-spacing: -4px; line-height: 0.9; position: relative; display: inline-block;
            background: linear-gradient(to bottom, #fff 40%, var(--secondary) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(6, 182, 212, 0.3));
        }

        .live-dot {
            height: 12px; width: 12px; background-color: var(--accent);
            border-radius: 50%; display: inline-block; vertical-align: middle;
            margin-left: 10px; box-shadow: 0 0 10px var(--accent);
            animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.7; } }

        .tagline { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 8px; margin-top: 20px; font-weight: 700; color: var(--accent); }

        .player-card {
            background: var(--glass); border: 2px solid var(--border-glass);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            padding: 50px 30px; border-radius: 50px; width: 100%; max-width: 580px; text-align: center;
            box-shadow: 0 40px 100px var(--card-shadow); margin-bottom: 80px; position: relative;
        }
        .player-card.playing { border-color: rgba(6, 182, 212, 0.4); box-shadow: 0 0 60px var(--glow-player), 0 40px 100px var(--card-shadow); }

        #track-title { font-weight: 900; font-size: 2.1rem; display: block; margin-bottom: 8px; color: var(--text-main); transition: opacity 0.3s; }
        #track-artist { font-size: 1rem; color: var(--secondary); text-transform: uppercase; letter-spacing: 5px; font-weight: 700; transition: opacity 0.3s; }

        .visualizer-inline { display: inline-flex; gap: 3px; height: 18px; margin-left: 10px; align-items: flex-end; }
        .vis-bar { width: 3px; background: var(--secondary); border-radius: 2px; height: 5px; }
        .playing .vis-bar { animation: barBounce 1s infinite alternate; }
        .playing .vis-bar:nth-child(1) { animation-delay: 0.1s; }
        .playing .vis-bar:nth-child(2) { animation-delay: 0.3s; }
        .playing .vis-bar:nth-child(3) { animation-delay: 0.5s; }
        @keyframes barBounce { 0% { height: 5px; } 100% { height: 18px; } }

        .play-outer { position: relative; width: 130px; height: 130px; margin: 30px auto; }
        .glow-ring {
            position: absolute; top: -8px; left: -8px; right: -8px; bottom: -8px; border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            opacity: 0; transition: 0.5s;
        }
        .playing .glow-ring { opacity: 0.6; animation: spinOrbit 3s linear infinite; filter: blur(12px); }
        @keyframes spinOrbit { 100% { transform: rotate(360deg); } }

        #playBtn {
            width: 100%; height: 100%; border-radius: 50%; border: none;
            background: var(--text-main); color: var(--bg-dark);
            font-size: 2.8rem; cursor: pointer; position: relative; z-index: 10;
        }
        .playing #playBtn { background: var(--accent); color: #fff; }

        .vol-wrap { display: flex; align-items: center; gap: 15px; width: 70%; margin: 0 auto; opacity: 0.4; }
        input[type=range] { flex: 1; cursor: pointer; accent-color: var(--secondary); height: 4px; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px;
            width: 100%; max-width: 1200px; padding-bottom: 40px;
        }
        .card { background: var(--glass); border: 1px solid var(--border-glass); padding: 40px; border-radius: 40px; }
        .card h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; text-transform: uppercase; color: var(--secondary); letter-spacing: 2px; display: flex; align-items: center; gap: 12px; }
        .big-text { font-size: 1.8rem; font-weight: 900; display: block; color: var(--text-main); margin: 10px 0; }
        .accent-text { color: var(--accent); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; }

        .soc-row { display: flex; gap: 15px; margin-top: 30px; }
        .soc-item { width: 55px; height: 55px; border-radius: 15px; background: var(--text-main); display: flex; align-items: center; justify-content: center; color: var(--bg-dark); text-decoration: none; font-size: 1.6rem; }

        .theme-toggle { position: fixed; top: 25px; right: 25px; z-index: 1000; background: var(--glass); border: 1px solid var(--border-glass); width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(12px); }

        footer { padding: 40px; text-align: center; border-top: 1px solid var(--border-glass); margin-top: auto; }
        footer p { font-size: 0.75rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.3); }

        @media (max-width: 768px) { h1 { font-size: 3.2rem; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="bg-animate"></div>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-moon" id="themeIcon"></i>
    </div>

    <div class="main-wrapper">
        <header>
            <h1>MOVEIT RÁDIO<span class="live-dot"></span></h1>
            <p class="tagline">Tvoje vlna energie</p>
        </header>

        <section class="player-card" id="playerContainer">
            <div class="now-playing">
                <span id="track-artist">MOVEIT RÁDIO</span>
                <span id="track-title">Pripravený na pohyb<div class="visualizer-inline"><div class="vis-bar"></div><div class="vis-bar"></div><div class="vis-bar"></div></div></span>
            </div>

            <div class="play-outer">
                <div class="glow-ring"></div>
                <button id="playBtn"><i class="fas fa-play" id="playIcon"></i></button>
            </div>

            <div class="vol-wrap">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8">
                <i class="fas fa-volume-up"></i>
            </div>
        </section>

        <div class="grid">
            <div class="card">
                <h2><i class="fas fa-compact-disc"></i> PROGRAM</h2>
                <p class="accent-text">Každý piatok:</p>
                <span class="big-text">Večerná zábava</span>
                <p style="opacity: 0.6; font-size: 0.9rem;">20:00 — 22:00 | LIVE DANCE MIX</p>
            </div>

            <div class="card">
                <h2><i class="fas fa-bolt"></i> EXTRA SHOW</h2>
                <p class="accent-text">Oficiálne vysielanie:</p>
                <span class="big-text">Denná zábava</span>
                <p style="opacity: 0.6; font-size: 0.9rem;">S DJ Filipom podľa aktuálnej nálady</p>
            </div>

            <div class="card">
                <h2><i class="fas fa-share-nodes"></i> SLEDUJ NÁS</h2>
                <div class="soc-row">
                    <a href="https://www.instagram.com/moveitradio_sk" class="soc-item" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.tiktok.com/@moveitradio_sk" class="soc-item" target="_blank"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>POWERED BY <a href="https://sites.google.com/view/martin-weby/web" target="_blank" style="color:var(--secondary); text-decoration:none;">MARTIN</a> &copy; 2026</p>
    </footer>

    <audio id="radioAudio" src="https://stream.zeno.fm/jkrusgbmbtcvv" preload="none"></audio>

    <script>
        const audio = document.getElementById('radioAudio');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const playerContainer = document.getElementById('playerContainer');
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        
        themeToggle.addEventListener('click', () => {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
                themeIcon.className = 'fas fa-moon';
            } else {
                document.body.setAttribute('data-theme', 'light');
                themeIcon.className = 'fas fa-sun';
            }
        });

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.src = "https://stream.zeno.fm/jkrusgbmbtcvv";
                audio.play();
                playIcon.className = 'fas fa-pause';
                playerContainer.classList.add('playing');
                trackTitle.innerHTML = "Načítavam...<div class='visualizer-inline'><div class='vis-bar'></div><div class='vis-bar'></div><div class='vis-bar'></div></div>";
            } else {
                audio.pause();
                audio.src = ""; 
                playIcon.className = 'fas fa-play';
                playerContainer.classList.remove('playing');
                trackTitle.innerHTML = "Zastavené<div class='visualizer-inline'><div class='vis-bar'></div><div class='vis-bar'></div><div class='vis-bar'></div></div>";
            }
        });

        document.getElementById('volume').addEventListener('input', (e) => audio.volume = e.target.value);

        let currentTitle = "";
        let currentArtist = "";

        function subscribeToMetadata() {
            const eventSource = new EventSource('https://api.zeno.fm/mounts/metadata/subscribe/jkrusgbmbtcvv');
            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.streamTitle) {
                    const parts = data.streamTitle.split(' - ');
                    let artist = (parts[0] || "MOVEIT RÁDIO").toUpperCase();
                    let title = (parts[1] || data.streamTitle).toUpperCase();
                    
                    if (artist !== currentArtist || title !== currentTitle) {
                        trackTitle.style.opacity = 0;
                        trackArtist.style.opacity = 0;
                        
                        setTimeout(() => {
                            trackArtist.innerText = artist;
                            trackTitle.innerHTML = title + "<div class='visualizer-inline'><div class='vis-bar'></div><div class='vis-bar'></div><div class='vis-bar'></div></div>";
                            trackTitle.style.opacity = 1;
                            trackArtist.style.opacity = 1;
                        }, 300);
                        
                        currentArtist = artist;
                        currentTitle = title;
                    }
                }
            };
        }
        subscribeToMetadata();
    </script>
</body>
</html>
